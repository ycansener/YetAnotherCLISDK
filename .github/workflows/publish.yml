name: Publish NuGet

   on:
     push:
       tags: [ 'v*.*.*' ]   # triggers on v1.0.0, v1.2.3, etc.

   jobs:
     publish:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4

         - uses: actions/setup-dotnet@v4
           with:
             dotnet-version: '10.x'

         - name: Pack
           run: dotnet pack YetAnotherCLISDK/YetAnotherCLISDK.csproj -c Release

         - name: Push
           run: |
             dotnet nuget push YetAnotherCLISDK/bin/Release/*.nupkg \
               --api-key ${{ secrets.NUGET_API_KEY }} \
               --source https://api.nuget.org/v3/index.json
             dotnet nuget push YetAnotherCLISDK/bin/Release/*.snupkg \
               --api-key ${{ secrets.NUGET_API_KEY }} \
               --source https://api.nuget.org/v3/index.json
